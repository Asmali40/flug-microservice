#  "." am Anfang bezeichnet den Top-Level Namensraum

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "postgres.fullname" . }}
  selector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "postgres.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: init-permissions
          image: {{ .Values.image.name }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/postgresql/18/docker /var/lib/postgresql/tablespace /var/run/postgresql']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - mountPath: /var/lib/postgresql/18/docker
              name: {{ include "postgres.name" . }}-data-volume
            - mountPath: /var/lib/postgresql/tablespace
              name: {{ include "postgres.name" . }}-tablespace-volume
            - mountPath: /var/run/postgresql
              name: {{ include "postgres.name" . }}-run-volume
      containers:
        - image: {{ .Values.image.name }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          name: {{ .Chart.Name }}
          args: ["postgres", "-c", "max_connections=10"]
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          #imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: {{ include "postgres.fullname" . }}
          env:
            - name: POSTGRES_USER
              value: flug
            - name: POSTGRES_DB
              value: flug
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres.fullname" . }}
                  key: password
          ports:
            - containerPort: 5432
              name: {{ .Chart.Name }}
          securityContext:
            # postgres
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            seLinuxOptions: {}
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: {{ .Values.resourcesRequests.cpu }}
              memory: {{ .Values.resourcesRequests.memory }}
              ephemeral-storage: {{ .Values.resourcesRequests.ephemeral }}
            limits:
              cpu: {{ .Values.resourcesLimits.cpu }}
              memory: {{ .Values.resourcesLimits.memory }}
              ephemeral-storage: {{ .Values.resourcesLimits.ephemeral }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "psql --dbname=flug --username=flug --command='SELECT 1'"]
            initialDelaySeconds: {{ .Values.liveness.initialDelay }}
            timeoutSeconds: {{ .Values.liveness.timeout }}
            periodSeconds: {{ .Values.liveness.period }}
            failureThreshold: {{ .Values.liveness.failureThreshold }}
            terminationGracePeriodSeconds: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "psql --dbname=flug --username=flug --command='SELECT 1'"]
            initialDelaySeconds: {{ .Values.readiness.initialDelay }}
            timeoutSeconds: {{ .Values.readiness.timeout }}
            periodSeconds: {{ .Values.readiness.period }}
            failureThreshold: {{ .Values.readiness.failureThreshold }}
          volumeMounts:
            - mountPath: /etc/postgresql/postgresql.conf
              name: {{ include "postgres.name" . }}-conf-volume
            - mountPath: /var/lib/postgresql/18/docker
              #mountPath: /var/lib/postgresql/data
              name: {{ include "postgres.name" . }}-data-volume
            - mountPath: /var/lib/postgresql/tablespace
              name: {{ include "postgres.name" . }}-tablespace-volume
            - mountPath: /var/run/postgresql
              name: {{ include "postgres.name" . }}-run-volume
            - mountPath: /var/lib/postgresql/key.pem
              name: {{ include "postgres.name" . }}-key-volume
            - mountPath: /var/lib/postgresql/certificate.crt
              name: {{ include "postgres.name" . }}-certificate-volume
            - mountPath: /docker-entrypoint-initdb.d
              name: {{ include "postgres.name" . }}-init-scripts-volume
      priorityClassName: high-priority
      # https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints
      # https://polaris.docs.fairwinds.com/checks/reliability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: ScheduleAnyway
      volumes:
        - name: {{ include "postgres.name" . }}-conf-volume
          emptyDir: {}
        - name: {{ include "postgres.name" . }}-data-volume
          emptyDir: {}
        - name: {{ include "postgres.name" . }}-tablespace-volume
          emptyDir: {}
        - name: {{ include "postgres.name" . }}-run-volume
          emptyDir: {}
        - name: {{ include "postgres.name" . }}-key-volume
          emptyDir: {}
        - name: {{ include "postgres.name" . }}-certificate-volume
          emptyDir: {}
        - name: {{ include "postgres.name" . }}-init-scripts-volume
          configMap:
            name: {{ include "postgres.fullname" . }}-init-scripts
      serviceAccountName: {{ include "postgres.fullname" . }}
      automountServiceAccountToken: false
